version: "3.8"

services:
  neo4j:
    image: neo4j:5
    container_name: neo4j_elections
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  python:
    image: python:3.12-slim
    container_name: tp4-python
    working_dir: /app
    volumes:
      - ./:/app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt && tail -f /dev/null"
    depends_on:
      - neo4j